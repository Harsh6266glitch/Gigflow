version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: gigflow-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gigflow
    networks:
      - gigflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/gigflow
      JWT_SECRET: ${JWT_SECRET:-gigflow_super_secret_key_change_in_prod}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
    depends_on:
      - mongo
    networks:
      - gigflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigflow-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - gigflow-network

volumes:
  mongo_data:

networks:
  gigflow-network:
    driver: bridge
